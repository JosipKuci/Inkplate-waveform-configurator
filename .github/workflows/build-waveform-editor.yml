name: Build Waveform Editor

on:
  push:
    tags:
      - "waveform-v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: waveform_editor
            asset_name: waveform-editor-linux
            archive: true
          - os: macos-latest
            artifact_name: waveform_editor
            asset_name: waveform-editor-macos
            archive: true
          - os: windows-latest
            artifact_name: waveform_editor.exe
            asset_name: waveform-editor-windows.exe
            archive: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller Pillow

      - name: Convert icon
        shell: bash
        run: |
          python -c "
          from PIL import Image
          import sys, os
          img = Image.open('docs/logo.jfif').convert('RGBA')
          if sys.platform == 'win32':
              img.save('docs/logo.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(32,32),(16,16)])
          elif sys.platform == 'darwin':
              img.save('docs/logo.icns', format='ICNS')
          "

      - name: Build with PyInstaller
        run: pyinstaller waveform_editor.spec

      - name: Rename artifact
        shell: bash
        run: mv dist/${{ matrix.artifact_name }} dist/${{ matrix.asset_name }}

      - name: Package as tar.gz (Linux and macOS)
        if: matrix.archive == true
        shell: bash
        run: tar -czf dist/${{ matrix.asset_name }}.tar.gz -C dist ${{ matrix.asset_name }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive == true && format('dist/{0}.tar.gz', matrix.asset_name) || format('dist/{0}', matrix.asset_name) }}
